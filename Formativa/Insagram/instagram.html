<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="menu">
        <div class="logo">
            <p><i class="fa-brands fa-instagram" style="color: rgb(255, 255, 255);"></i></p>
        </div>
        <div class="home-icone">
            <p><i class="fa-solid fa-house" style="color: rgb(255, 255, 255);"></i></p>
        </div>
        <div class="reels-icone">
            <p><i class="fa-solid fa-play" style="color: rgb(255, 255, 255);"></i></p>
        </div>
        <div class="mensagem-icone">
            <p><i class="fa-regular fa-paper-plane" style="color: rgb(255, 255, 255);"></i></p>
        </div>
        <div class="pesquisa-icone">
            <p><i class="fa-brands fa-sistrix" style="color: rgb(255, 255, 255);"></i></p>
        </div>
        <div class="explorar-icone">
            <p><i class="fa-regular fa-compass" style="color: rgb(255, 255, 255);"></i></p>
        </div>
        <div class="notificacao-icone">
            <p><i class="fa-regular fa-heart" style="color: rgb(255, 255, 255);"></i></p>
        </div>
        <div class="criar-icone">
            <p><i class="fa-solid fa-plus" style="color: rgb(255, 255, 255);"></i></p>
        </div>
        <div class="perfil-icone">
            <p><i class="fa-regular fa-circle-user" style="color: rgb(255, 255, 255);"></i></p>
        </div>
        <div class="mais-icone">
            <p><i class="fa-solid fa-bars" style="color: rgb(255, 255, 255);"></i></p>
        </div>
    </div>

    <div class="feed">
        <div class="storys">
            <div class="storys-perfil"></div>
            <div class="storys-perfil"></div>
            <div class="storys-perfil"></div>
            <div class="storys-perfil"></div>
            <div class="storys-perfil"></div>
            <div class="storys-perfil"></div>
        </div>
        <div class="publicacoes">

        </div>
    </div>

    <div class="sugestao">
            
    </div>

    <div class="mensagem"></div>
</body>
</html>
